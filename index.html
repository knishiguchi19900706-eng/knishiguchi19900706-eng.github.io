<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kohei Nishiguchi - Indie iOS Developer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
            background: linear-gradient(180deg, #FAE8D5 0%, #F0D5BE 100%);
            color: #3E2723;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 720px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 0 12px 48px rgba(62, 39, 35, 0.12);
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 800;
        }
        .subtitle {
            font-size: 14px;
            color: #8D6E63;
            margin-bottom: 32px;
            font-style: italic;
        }
        .apps {
            margin: 32px 0;
        }
        .app-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 16px;
            text-align: left;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }
        .app-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #FFAB40, #FF6D00);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }
        .app-info h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        .app-info p {
            font-size: 12px;
            color: #8D6E63;
        }
        .links {
            margin-top: 32px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #FF6D00;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border: 2px solid #FF6D00;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .links a:hover {
            background: #FF6D00;
            color: white;
        }
        .contact-note {
            margin-top: 20px;
            font-size: 12px;
            color: #8D6E63;
            line-height: 1.6;
        }
        .contact-note-en {
            font-size: 10px;
            color: #A1887F;
            font-style: italic;
        }
        footer {
            margin-top: 32px;
            font-size: 11px;
            color: #8D6E63;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Kohei Nishiguchi</h1>
        <p class="subtitle">Indie iOS Developer</p>

        <div class="apps">
            <div class="app-card">
                <div class="app-icon">👴</div>
                <div class="app-info">
                    <h2>こっそり毛抜き / Stealth Hair Plucker</h2>
                    <p>抜いて・育てて・植える、新感覚のヘアエンタメゲーム</p>
                </div>
            </div>
        </div>

        <div class="links">
            <a href="https://apps.apple.com/" target="_blank" rel="noopener">App Store</a>
            <a href="https://forms.gle/SFtxK6ktMsh6ut1g6" target="_blank" rel="noopener">Contact / お問い合わせ</a>
        </div>

        <p class="contact-note">
            お問い合わせはフォームよりお願いいたします。<br>
            <span class="contact-note-en">Please use the contact form above for inquiries.</span>
        </p>

        <footer>
            <p>&copy; 2026 Kohei Nishiguchi. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
